name: CI

# Déclenchement du pipeline sur les push et pull requests vers main et develop
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ─────────────────────────────────────────────────────────
  # Étape 1 : Compilation et exécution des tests unitaires
  # ─────────────────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      # Récupération du code source
      - name: Checkout
        uses: actions/checkout@v4

      # Installation de Java 17 (JDK Temurin)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Compilation du projet Maven sans exécuter les tests
      - name: Build (maven)
        run: mvn -B clean package -DskipTests

      # Vérification du style de code via Checkstyle (non bloquant)
      - name: Lint (maven-checkstyle)
        run: mvn -B org.apache.maven.plugins:maven-checkstyle-plugin:check || true

      # Exécution de tous les tests unitaires
      - name: Run unit tests
        run: mvn -B test

      # Placeholder pour l'upload du rapport de couverture (JaCoCo)
      - name: Upload coverage (placeholder)
        if: always()
        run: echo "Coverage report step - configure JaCoCo upload here"

  # ─────────────────────────────────────────────────────────
  # Étape 2 : Analyse de la qualité du code avec SonarCloud
  # ─────────────────────────────────────────────────────────
  sonarcloud:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      # Récupération du code source
      - uses: actions/checkout@v4

      # Installation de Java 17 nécessaire pour l'analyse SonarCloud
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Compilation du projet pour générer target/classes (requis par SonarCloud)
      - name: Compiler le projet
        run: mvn -B compile

      # Lancement de l'analyse SonarCloud via le plugin Maven (recommandé pour les projets Maven)
      - name: SonarCloud Scan
        run: mvn -B sonar:sonar
          -Dsonar.projectKey=Fotso12_TaskManager
          -Dsonar.organization=fotso12
          -Dsonar.host.url=https://sonarcloud.io
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


  # ─────────────────────────────────────────────────────────
  # Étape 3 : Analyse de sécurité (Trivy + Gitleaks)
  # ─────────────────────────────────────────────────────────
  security-scan:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      # Récupération du code source
      - uses: actions/checkout@v4

      # Scan de sécurité du système de fichiers avec Trivy
      # Détecte les vulnérabilités dans les dépendances (exit-code 0 = non bloquant)
      - name: Trivy Scan (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          format: 'table'
          exit-code: '0'
          scan-type: 'fs'
          scan-ref: '.'

      # Détection de secrets ou données sensibles dans le code source avec Gitleaks
      - name: Gitleaks Scan
        uses: zricethezav/gitleaks-action@v1
        with:
          args: '--path=.'

  # ─────────────────────────────────────────────────────────
  # Étape 4 : Construction et publication de l'image Docker
  # ─────────────────────────────────────────────────────────
  docker-build-push:
    needs: [build-and-test, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      # Récupération du code source
      - name: Checkout
        uses: actions/checkout@v4

      # Construction de l'image Docker taguée avec le SHA du commit
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_NAME }}/taskmanager:${{ github.sha }} .

      # Connexion à Docker Hub avec les identifiants stockés en secrets
      - name: Login to Docker Hub
        run: |
          echo ${{ secrets.DOCKER_TOKEN }} | docker login -u ${{ secrets.DOCKER_NAME }} --password-stdin

      # Publication de l'image taguée avec le SHA du commit
      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_NAME }}/taskmanager:${{ github.sha }}

      # Tag supplémentaire "latest" et publication
      - name: Tag image as latest
        run: |
          docker tag ${{ secrets.DOCKER_NAME }}/taskmanager:${{ github.sha }} ${{ secrets.DOCKER_NAME }}/taskmanager:latest
          docker push ${{ secrets.DOCKER_NAME }}/taskmanager:latest

      # Sauvegarde du nom de l'image dans les outputs du job pour réutilisation
      - name: Set output image
        id: image
        run: echo "image=${{ secrets.DOCKER_NAME }}/taskmanager:${{ github.sha }}" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────
  # Étape 5 : Déploiement sur le serveur distant via SSH
  # Exécuté uniquement sur la branche main après build/push Docker
  # ─────────────────────────────────────────────────────────
  deploy:
    needs: docker-build-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      # Connexion SSH au serveur et déploiement via docker-compose
      - name: Deploy to remote server via SSH
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            echo "Connexion à Docker Hub..."
            docker login -u ${{ secrets.DOCKER_NAME }} -p ${{ secrets.DOCKER_TOKEN }}
            echo "Téléchargement de la nouvelle image..."
            docker pull ${{ secrets.DOCKER_NAME }}/taskmanager:${{ github.sha }} || true
            docker tag ${{ secrets.DOCKER_NAME }}/taskmanager:${{ github.sha }} ${{ secrets.DOCKER_NAME }}/taskmanager:latest || true
            # Chemin vers le fichier docker-compose sur le serveur distant
            REMOTE_COMPOSE=/opt/taskmanager/docker-compose.yml
            echo "Redémarrage du service via docker-compose..."
            docker-compose -f $REMOTE_COMPOSE pull app || true
            docker-compose -f $REMOTE_COMPOSE up -d --no-deps --build app
