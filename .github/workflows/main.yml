name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build (maven)
        run: mvn -B clean package -DskipTests

      - name: Lint (maven-checkstyle)
        run: mvn -B org.apache.maven.plugins:maven-checkstyle-plugin:check || true

      - name: Run unit tests
        run: mvn -B test

      - name: Upload coverage (placeholder)
        if: always()
        run: echo "Coverage report step - configure JaCoCo upload here"

  sonarcloud:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@master
        with:
          projectBaseDir: TaskManager/TaskManager
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}

  security-scan:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy Scan (Docker image)
        uses: aquasecurity/trivy-action@master
        with:
          format: 'table'
          exit-code: '0'
          scan-type: 'image'
          image-ref: 'taskmanager/app:latest'

      - name: Gitleaks Scan
        uses: zricethezav/gitleaks-action@v1
        with:
          args: '--path=.'

  docker-build-push:
    needs: [build-and-test, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_NAME }}/taskmanager:${{ github.sha }} TaskManager/TaskManager

      - name: Login to Docker Hub
        run: |
          echo ${{ secrets.DOCKER_TOKEN }} | docker login -u ${{ secrets.DOCKER_NAME }} --password-stdin

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_NAME }}/taskmanager:${{ github.sha }}

      - name: Tag image as latest
        run: |
          docker tag ${{ secrets.DOCKER_NAME }}/taskmanager:${{ github.sha }} ${{ secrets.DOCKER_NAME }}/taskmanager:latest
          docker push ${{ secrets.DOCKER_NAME }}/taskmanager:latest

      - name: Set output image
        id: image
        run: echo "image=${{ secrets.DOCKER_NAME }}/taskmanager:${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy:
    needs: docker-build-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to remote server via SSH
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            echo "Logging in to Docker Hub..."
            docker login -u ${{ secrets.DOCKER_NAME }} -p ${{ secrets.DOCKER_TOKEN }}
            echo "Pulling image"
            docker pull ${{ secrets.DOCKER_NAME }}/taskmanager:${{ github.sha }} || true
            docker tag ${{ secrets.DOCKER_NAME }}/taskmanager:${{ github.sha }} ${{ secrets.DOCKER_NAME }}/taskmanager:latest || true
            # Path to your remote docker-compose file - adjust if needed
            REMOTE_COMPOSE=/opt/taskmanager/docker-compose.yml
            echo "Updating and restarting compose service"
            docker-compose -f $REMOTE_COMPOSE pull app || true
            docker-compose -f $REMOTE_COMPOSE up -d --no-deps --build app

